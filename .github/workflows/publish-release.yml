name: Publish Release

# Skeleton release workflow for repos with no build artefacts (framework repos,
# documentation repos, etc.).
#
# Triggered by a tag push. This workflow:
#   1. Updates TEMPLATE_VERSION on main to the released tag
#   2. Creates the GitHub release (stub) — which triggers the Release Notes
#      workflow (release.yml) to generate and update the AI release notes
#
# For repos that produce build artefacts (Go binaries, npm packages, etc.),
# replace this workflow with your build tool's own release workflow
# (GoReleaser, semantic-release, etc.). See base/docs/examples/ for patterns.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main
          token: ${{ secrets.GOOSE_AGENT_PAT }}

      - name: Update TEMPLATE_VERSION
        run: |
          echo "${{ github.ref_name }}" > TEMPLATE_VERSION
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TEMPLATE_VERSION
          git commit -m "chore: update TEMPLATE_VERSION to ${{ github.ref_name }}"
          git push origin main

      - name: Create GitHub release
        run: |
          curl -sf -X POST \
            -H "Authorization: token ${{ secrets.GOOSE_AGENT_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\": \"${{ github.ref_name }}\", \"name\": \"Release ${{ github.ref_name }}\", \"body\": \"Generating release notes\u2026\"}"
