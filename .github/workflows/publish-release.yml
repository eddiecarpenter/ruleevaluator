# publish-release.yml — Example release workflows
#
# Copy the relevant example to .github/workflows/publish-release.yml in your
# repo and adapt it. You own this file — it is not managed or synced by the
# ai-native-delivery framework.
#
# How the release chain works:
#
#   tag push
#     ↓
#   Your workflow (this file) — creates the GitHub release
#     ↓
#   on: release: types: [published]
#     ↓
#   Framework release.yml — generates AI notes, updates the release body
#
# The framework only updates release notes. It does not create releases,
# build artefacts, or publish to registries — that is entirely your concern.

# ============================================================================
# EXAMPLE A — No build artefacts (framework repos, docs repos, etc.)
# ============================================================================
# Triggered by tag push. Creates a stub GitHub release, which triggers the
# framework to generate and update the AI release notes.

name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    # Do NOT add permissions: contents: write here.
    # GITHUB_TOKEN must NOT be used to create or publish the release — events
    # fired by GITHUB_TOKEN do not trigger downstream workflows, so release.yml
    # would never run. GOOSE_AGENT_PAT is required for the release: published
    # event to reach release.yml.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create and publish release
        # Uses PAT so the release: published event triggers release.yml.
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes "Generating release notes…"
        env:
          GH_TOKEN: ${{ secrets.GOOSE_AGENT_PAT }}


