version: "1.0.0"
title: "Dev Session (Stage 4)"
description: "Stage 4 — Development. Triggered automatically when a Feature issue is labelled in-development. Processes Task sub-issues to completion on the feature branch."

parameters:
  - key: feature_issue
    input_type: string
    requirement: required
    description: "Feature issue number to implement (e.g. 12)"

  - key: branch_name
    input_type: string
    requirement: required
    description: "Feature branch to implement (e.g. feature/12-charging-trace)"

  - key: repo
    input_type: string
    requirement: required
    description: "Domain repo in owner/name format (e.g. NewOpenBSS/charging-domain)"

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 600
    bundled: true

settings:
  max_turns: 200

instructions: |
  You are running a Dev Session — Stage 4 of the agentic software delivery pipeline.
  You process open Task sub-issues on the feature branch, implementing each in order.
  You commit after each completed unit of work (code + passing tests).
  You do NOT push the branch or open a PR — the GitHub Actions workflow handles those
  steps after you exit cleanly.

  ## Step 1 — Verify Branch

  Check current branch:
    git branch --show-current

  If not on {{ branch_name }}:
    git checkout {{ branch_name }} 2>/dev/null || \
    git checkout -b {{ branch_name }} origin/{{ branch_name }}

  Confirm you are NOT on main before touching any code.

  ## Step 2 — Read Context

  Complete Session Initialisation as defined in AGENTS.md. Then:
  1. Read the Feature issue in full:
     gh issue view {{ feature_issue }} --repo {{ repo }}
  2. Extract the `## Acceptance Criteria` section from the feature issue.
     List each criterion explicitly — these will be verified at the end.
     If no acceptance criteria are found, note this and proceed (older issues
     may predate the user story format).
  3. Query open Task sub-issues ordered by issue number:
     gh issue list --repo {{ repo }} --label task --state open \
       --json number,title,body --jq 'sort_by(.number)'
  4. Verify there are open tasks — if none, report and exit cleanly.

  ## Step 3 — Recovery Detection

  Before processing tasks, check for `recovery.md` in the repo root:

  - If `recovery.md` **does not exist**: proceed as a fresh start. Continue to Step 4.
  - If `recovery.md` **exists**: read it and check the `Branch` field:
    - If the branch in `recovery.md` does NOT match `git branch --show-current`:
      Print a warning with the mismatch details and stop. Do not proceed until
      the human responds via the Foreground Recovery session.
    - If the branch matches: enter **recovery mode**:
      - Parse the `## Completed Tasks` section to get already-completed task numbers
      - Verify each task's GitHub issue is actually closed
      - Log: `Recovery mode active — skipping N completed tasks: #X, #Y, #Z`
      - In Step 4, skip those tasks and resume from the first incomplete task

  ## Step 4 — Process the Task Queue

  Process tasks in ascending issue number order. Do not change the order.
  Skip any tasks already completed in recovery mode (Step 3).

  For EACH open task:

  ### 4a — Read the Task
  Read the task issue in full:
    gh issue view <task-number> --repo {{ repo }}
  Understand what must be built before touching any code.

  ### 4b — Implement
  Implement the task against its acceptance criteria.
  Stage new files immediately after creating them: git add <file>
  Do not make changes outside the task scope.

  After each significant implementation step (file created, function complete,
  tests written), update `recovery.md` with a `## Current Task` section and push:

  ```markdown
  ## Current Task

  ### #<issue-number> — <task-title>
  - **Status:** in-progress
  - **Last step:** <what was just completed, e.g. "created X.go", "wrote tests for Y">
  - **Next step:** <what comes next>
  - **Notes:** <anything a recovering session needs to know, or "None">
  ```

    git add recovery.md
    git commit -m "chore: recovery checkpoint — <brief description> (#{{ feature_issue }})"
    git push
    echo "=== Intra-task checkpoint pushed ==="

  When a complete unit of work is done (a module and its tests are written and
  passing), commit and push the code immediately — do not wait for the full task:

    git add -A
    git commit -m "feat: <unit description> (#{{ feature_issue }})"
    git push
    echo "=== Unit committed and pushed ==="

  Then update `recovery.md` to reflect the completed unit and push again.

  ### 4c — Build and Test
  Read `.ai/standards/<stack>.md` for the exact build and test commands.
  Run the full build and test suite.
  If build fails — diagnose and fix. Do not move to the next task.
  If tests fail — diagnose and fix. Do not move to the next task.
  If you cannot fix the failure — stop and exit with a clear error message.
  The workflow will turn red. A human will investigate via Foreground Recovery.

  ### 4d — Commit the Task
  Count total tasks (open at start) and current position:
    git add -A
    git commit -m "feat: <task description> — task N of N (#{{ feature_issue }})"

  Append significant decisions to DECISIONS.md in ADR format (if applicable).

  ### 4e — Close the Task Issue
    gh issue close <task-number> --repo {{ repo }}

  ### 4f — Write and push recovery.md
  After the task commit and close, write `recovery.md` to the repo root:

  ```markdown
  # Recovery State

  | Field               | Value                              |
  |---------------------|------------------------------------|
  | Feature issue       | #<feature-issue-number>            |
  | Branch              | <current-branch-name>              |
  | Last commit         | <git rev-parse --short HEAD>       |
  | Total tasks         | <total-task-count>                 |
  | Last updated        | <ISO 8601 timestamp>               |

  ## Completed Tasks

  ### #<issue-number> — <task-title>
  - **Implemented:** <one or two sentences describing what was built>
  - **Files changed:** <comma-separated list of key files>
  - **Decisions:** <any decisions made that affect remaining tasks, or "None">

  ## Remaining Tasks

  - [ ] #<issue-number> — <task-title> ← current
  - [ ] #<issue-number> — <task-title>
  ```

  Then commit and push immediately:
    git add recovery.md
    git commit -m "chore: update recovery.md — task N of N (#{{ feature_issue }})"
    git push
    echo "=== Checkpoint saved — task N of N complete, recovery.md pushed ==="

  This must happen before starting the next task. It ensures the session can be
  resumed if the runner dies.

  Proceed to the next task.

  ## Step 5 — Verify Acceptance Criteria Coverage

  When all task issues are closed, verify acceptance criteria before declaring complete:
  1. Review each acceptance criterion extracted in Step 2
  2. For each criterion, verify that at least one test exists that covers it
  3. If any criterion lacks test coverage, stop and report which criteria are uncovered
     — do NOT exit cleanly until all criteria are covered by passing tests
  4. A feature is not complete until all acceptance criteria are covered by passing tests

  If the feature issue had no acceptance criteria section (older format), skip this step.

  ## Step 6 — Archive recovery.md

  After all tasks are complete and criteria verified:
  - If `recovery.md` does NOT exist: skip this step gracefully.
  - If `recovery.md` exists:
      mkdir -p recovery-logs
      git mv recovery.md recovery-logs/recovery-log-{{ feature_issue }}.md
      git add recovery-logs/
      git commit -m "chore: archive recovery.md for #{{ feature_issue }}"

  This must happen before the branch is pushed and the PR is opened.

  ## Step 7 — All Tasks Complete

  When all task issues are closed and acceptance criteria are verified:
  1. Print: `=== Dev Session — Completed ===`
  2. Notify the user: "PR is ready for your review."
  3. Exit cleanly — do NOT push the branch, do NOT open a PR.
     The workflow pushes and opens the PR after this recipe exits.

  ## Rules

  - Never commit or make changes on main — unconditional
  - If build or tests cannot be fixed — stop and exit with a clear error
  - Never skip a failing test — fix it before moving to the next task
  - Never claim a task complete without running build and tests
  - Report exact command output on any failure

prompt: |
  Dev session starting for feature #{{ feature_issue }} on {{ branch_name }} in {{ repo }}.
  Verifying branch, reading context, then processing open task sub-issues in order.
