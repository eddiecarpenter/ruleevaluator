name: Add Issue to Project

# Automatically adds newly opened issues to the GitHub Project board
# and sets their initial status based on pipeline labels.

on:
  issues:
    types: [opened]

jobs:
  add-issue-to-project:
    name: Add issue to project board
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read

    steps:
      # -----------------------------------------------------------------------
      # Step 1 — Check if project sync is configured
      # Exit silently if AGENTIC_PROJECT_ID is not set (graceful no-op)
      # -----------------------------------------------------------------------
      - name: Check project configuration
        id: config
        run: |
          if [ -z "${{ vars.AGENTIC_PROJECT_ID }}" ]; then
            echo "AGENTIC_PROJECT_ID not set — skipping project sync"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # -----------------------------------------------------------------------
      # Step 2 — Add issue to project
      # Uses addProjectV2ItemById mutation to add the issue to the board
      # -----------------------------------------------------------------------
      - name: Add issue to project
        if: steps.config.outputs.skip != 'true'
        id: add
        env:
          GH_TOKEN: ${{ secrets.GOOSE_AGENT_PAT }}
        run: |
          ISSUE_NODE_ID="${{ github.event.issue.node_id }}"
          PROJECT_ID="${{ vars.AGENTIC_PROJECT_ID }}"

          RESULT=$(gh api graphql -f query='
            mutation($projectId: ID!, $contentId: ID!) {
              addProjectV2ItemById(input: {
                projectId: $projectId
                contentId: $contentId
              }) {
                item {
                  id
                }
              }
            }
          ' \
            -f projectId="${PROJECT_ID}" \
            -f contentId="${ISSUE_NODE_ID}")

          ITEM_ID=$(echo "${RESULT}" | jq -r '.data.addProjectV2ItemById.item.id')

          if [ -z "${ITEM_ID}" ] || [ "${ITEM_ID}" = "null" ]; then
            echo "::error::Failed to add issue to project"
            exit 1
          fi

          echo "item_id=${ITEM_ID}" >> $GITHUB_OUTPUT
          echo "Added issue to project — item ID: ${ITEM_ID}"

      # -----------------------------------------------------------------------
      # Step 3 — Map issue labels to a project status column name
      # Only pipeline labels are mapped; if none present, skip status update
      # -----------------------------------------------------------------------
      - name: Map labels to status
        if: steps.config.outputs.skip != 'true' && steps.add.outputs.item_id
        id: map
        run: |
          # Read all labels from the issue event payload
          LABELS='${{ toJson(github.event.issue.labels.*.name) }}'

          STATUS=""
          for LABEL in $(echo "${LABELS}" | jq -r '.[]'); do
            case "${LABEL}" in
              backlog)          STATUS="Backlog"; break ;;
              scoping)          STATUS="Scoping"; break ;;
              scheduled)        STATUS="Scheduled"; break ;;
              in-design)        STATUS="In Design"; break ;;
              in-development)   STATUS="In Development"; break ;;
              in-review)        STATUS="In Review"; break ;;
              done)             STATUS="Done"; break ;;
            esac
          done

          if [ -z "${STATUS}" ]; then
            echo "No pipeline label found — leaving status unset"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "status=${STATUS}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Mapped label to status: ${STATUS}"

      # -----------------------------------------------------------------------
      # Step 4 — Get the Status field ID and option ID for the target status
      # -----------------------------------------------------------------------
      - name: Get status field and option
        if: steps.config.outputs.skip != 'true' && steps.add.outputs.item_id && steps.map.outputs.skip != 'true'
        id: field
        env:
          GH_TOKEN: ${{ secrets.GOOSE_AGENT_PAT }}
        run: |
          PROJECT_ID="${{ vars.AGENTIC_PROJECT_ID }}"
          TARGET_STATUS="${{ steps.map.outputs.status }}"

          # Query project fields to find the Status field and its options
          RESULT=$(gh api graphql -f query='
            query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  fields(first: 50) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          ' -f projectId="${PROJECT_ID}")

          # Extract the Status field ID
          FIELD_ID=$(echo "${RESULT}" | jq -r \
            '.data.node.fields.nodes[] | select(.name == "Status") | .id')

          if [ -z "${FIELD_ID}" ]; then
            echo "::error::Status field not found on project"
            exit 1
          fi

          # Extract the option ID for the target status
          OPTION_ID=$(echo "${RESULT}" | jq -r \
            --arg status "${TARGET_STATUS}" \
            '.data.node.fields.nodes[] | select(.name == "Status") | .options[] | select(.name == $status) | .id')

          if [ -z "${OPTION_ID}" ]; then
            echo "::error::Status option '${TARGET_STATUS}' not found on project"
            exit 1
          fi

          echo "field_id=${FIELD_ID}" >> $GITHUB_OUTPUT
          echo "option_id=${OPTION_ID}" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # Step 5 — Update the project item status
      # -----------------------------------------------------------------------
      - name: Update project status
        if: steps.config.outputs.skip != 'true' && steps.add.outputs.item_id && steps.map.outputs.skip != 'true' && steps.field.outputs.field_id
        env:
          GH_TOKEN: ${{ secrets.GOOSE_AGENT_PAT }}
        run: |
          PROJECT_ID="${{ vars.AGENTIC_PROJECT_ID }}"
          ITEM_ID="${{ steps.add.outputs.item_id }}"
          FIELD_ID="${{ steps.field.outputs.field_id }}"
          OPTION_ID="${{ steps.field.outputs.option_id }}"

          gh api graphql -f query='
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }) {
                projectV2Item {
                  id
                }
              }
            }
          ' \
            -f projectId="${PROJECT_ID}" \
            -f itemId="${ITEM_ID}" \
            -f fieldId="${FIELD_ID}" \
            -f optionId="${OPTION_ID}"

          echo "Updated project status to '${{ steps.map.outputs.status }}'"
