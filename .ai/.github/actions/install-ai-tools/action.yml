name: Install AI Tools
description: >
  Install system dependencies, Goose and Claude Code CLI with caching support.

inputs:
  goose-version:
    description: 'Goose version to install (default: latest)'
    required: false
    default: 'latest'
  claude-cli-version:
    description: 'Claude Code CLI version to install (default: latest)'
    required: false
    default: 'latest'

runs:
  using: composite
  steps:
    - name: Install system dependencies
      uses: ./.github/actions/install-system-deps

    - name: Resolve Goose version
      id: goose-version
      shell: bash
      env:
        INPUT_GOOSE_VERSION: ${{ inputs.goose-version }}
      run: |
        if [ "${INPUT_GOOSE_VERSION}" = "latest" ]; then
          GOOSE_VERSION=$(curl --proto '=https' --tlsv1.2 -fsSL https://api.github.com/repos/block/goose/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
        else
          GOOSE_VERSION="${INPUT_GOOSE_VERSION}"
        fi
        echo "version=${GOOSE_VERSION}" >> $GITHUB_OUTPUT

    - name: Resolve Claude CLI version
      id: claude-version
      shell: bash
      env:
        INPUT_CLAUDE_VERSION: ${{ inputs.claude-cli-version }}
      run: |
        if [ "${INPUT_CLAUDE_VERSION}" = "latest" ]; then
          CLAUDE_VERSION=$(npm view @anthropic-ai/claude-code version 2>/dev/null || echo "unknown")
        else
          CLAUDE_VERSION="${INPUT_CLAUDE_VERSION}"
        fi
        echo "version=${CLAUDE_VERSION}" >> $GITHUB_OUTPUT

    - name: Cache Goose binary
      id: cache-goose
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      with:
        path: ~/.local/bin/goose
        key: goose-${{ steps.goose-version.outputs.version }}

    - name: Install Goose
      if: steps.cache-goose.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p ~/.local/bin
        GOOSE_VERSION="${{ steps.goose-version.outputs.version }}"
        curl --proto '=https' --tlsv1.2 -fsSL "https://github.com/block/goose/releases/download/v${GOOSE_VERSION}/goose-x86_64-unknown-linux-gnu.tar.bz2" -o /tmp/goose.tar.bz2
        tar -xj -C ~/.local/bin -f /tmp/goose.tar.bz2

    - name: Cache Claude Code CLI
      id: cache-claude
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      with:
        path: ${{ runner.tool_cache }}/claude-cli
        key: claude-cli-${{ steps.claude-version.outputs.version }}

    - name: Install Claude Code CLI
      if: steps.cache-claude.outputs.cache-hit != 'true'
      shell: bash
      env:
        INPUT_CLAUDE_VERSION: ${{ inputs.claude-cli-version }}
        TOOL_CACHE: ${{ runner.tool_cache }}
      run: |
        npm config set prefix "${TOOL_CACHE}/claude-cli"
        if [ "${INPUT_CLAUDE_VERSION}" = "latest" ]; then
          npm install -g @anthropic-ai/claude-code
        else
          npm install -g "@anthropic-ai/claude-code@${INPUT_CLAUDE_VERSION}"
        fi

    - name: Restore Claude CLI from cache
      if: steps.cache-claude.outputs.cache-hit == 'true'
      shell: bash
      run: |
        npm config set prefix "${{ runner.tool_cache }}/claude-cli"

    - name: Add tools to PATH
      shell: bash
      run: |
        mkdir -p ~/.local/bin
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        echo "${{ runner.tool_cache }}/claude-cli/bin" >> $GITHUB_PATH
